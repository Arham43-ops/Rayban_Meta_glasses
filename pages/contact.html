<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Ray-Ban Meta Support</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header></header>

    <main>
        <section class="page-header glass-morphism" style="padding: 140px 0 60px; text-align: center;">
            <div class="container animate">
                <h1 style="font-size: clamp(2rem, 5vw, 4rem); font-family: 'Outfit', sans-serif;">Get in Touch</h1>
                <p style="color: var(--text-muted); margin-top: 16px; font-size: 1.1rem;">Have questions about Meta smart glasses? We're here to help.</p>
            </div>
        </section>

        <section class="container animate" style="padding: 80px 0 100px;">
            <div style="max-width: 800px; margin: 0 auto;">
                <div class="glass-morphism" style="padding: 50px; border-radius: var(--radius-lg);">
                    <form onsubmit="event.preventDefault(); alert('Message sent! We will contact you soon.');">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px;">
                            <div class="form-group">
                                <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted);">First Name</label>
                                <input type="text" class="btn-glass" placeholder="John" style="width: 100%; text-align: left; padding: 12px 20px; cursor: text;">
                            </div>
                            <div class="form-group">
                                <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted);">Last Name</label>
                                <input type="text" class="btn-glass" placeholder="Doe" style="width: 100%; text-align: left; padding: 12px 20px; cursor: text;">
                            </div>
                        </div>
                        <div class="form-group" style="margin-bottom: 24px;">
                            <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted);">Email Address</label>
                            <input type="email" class="btn-glass" placeholder="john@example.com" style="width: 100%; text-align: left; padding: 12px 20px; cursor: text;">
                        </div>
                        <div class="form-group" style="margin-bottom: 32px;">
                            <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted);">Message</label>
                            <textarea class="btn-glass" rows="5" placeholder="How can we help you?" style="width: 100%; text-align: left; padding: 12px 20px; cursor: text; resize: vertical;"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 16px;">Send Message</button>
                    </form>
                </div>
                
                <div style="margin-top: 60px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 30px; text-align: center;">
                    <div class="glass-morphism" style="padding: 24px; border-radius: var(--radius-md);">
                        <div style="font-size: 1.5rem; margin-bottom: 10px;">📍</div>
                        <h4 style="margin-bottom: 8px;">Visit Us</h4>
                        <p style="color: var(--text-muted); font-size: 0.9rem;">1 Meta Way, Menlo Park, CA</p>
                    </div>
                    <div class="glass-morphism" style="padding: 24px; border-radius: var(--radius-md);">
                        <div style="font-size: 1.5rem; margin-bottom: 10px;">✉️</div>
                        <h4 style="margin-bottom: 8px;">Email Us</h4>
                        <p style="color: var(--text-muted); font-size: 0.9rem;">meta-glasses@support.com</p>
                    </div>
                    <div class="glass-morphism" style="padding: 24px; border-radius: var(--radius-md);">
                        <div style="font-size: 1.5rem; margin-bottom: 10px;">📞</div>
                        <h4 style="margin-bottom: 8px;">Call Us</h4>
                        <p style="color: var(--text-muted); font-size: 0.9rem;">+1 (800) RAY-BAN-M</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer></footer>

    <script src="../js/app.js"></script>
</body>
</html>
