<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Ray-Ban Meta Support</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .contact-form {
            max-width: 600px;
            margin: 0 auto;
            background: var(--glass);
            padding: 40px;
            border-radius: var(--radius-md);
            border: 1px solid var(--glass-border);
        }
        .form-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            color: white;
            outline: none;
        }
        input:focus, textarea:focus {
            border-color: var(--accent);
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="../index.html" class="brand">RAY-BAN | META</a>
                <ul class="nav-links">
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="shop.html">Shop</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
                <div class="nav-actions">
                    <a href="cart.html" id="cart-btn">
                        🛒 <span class="cart-count">0</span>
                    </a>
                </div>
            </nav>
        </div>
    </header>

    <main style="padding-top: 120px;">
        <section class="container animate">
            <div class="section-title">
                <h1>Get in Touch</h1>
                <p style="color: var(--text-muted);">Have questions about Ray-Ban Meta? We're here to help.</p>
            </div>
            
            <div class="contact-form">
                <form onsubmit="event.preventDefault(); alert('Message sent! We will get back to you soon.');">
                    <div class="form-group">
                        <label>Your Name</label>
                        <input type="text" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="john@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea rows="5" placeholder="Tell us how we can help..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                &copy; 2026 Ray-Ban Meta Shop. All Rights Reserved.
            </div>
        </div>
    </footer>

    <script src="../js/app.js"></script>
</body>
</html>
