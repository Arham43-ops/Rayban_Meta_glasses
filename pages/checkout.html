<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Ray-Ban Meta</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header></header>

    <main style="padding-top: 120px; min-height: 80vh;">
        <section class="container animate">
            <div class="section-title">
                <h1>Checkout</h1>
                <p style="color: var(--text-muted); margin-top: 12px;">Complete your order to join the future of eyewear.</p>
            </div>
            
            <div class="checkout-grid" style="display: grid; grid-template-columns: 1fr 400px; gap: 40px; margin-bottom: 100px;">
                <div class="glass-morphism" style="padding: 40px; border-radius: var(--radius-lg);">
                    <h3 style="margin-bottom: 30px;">Shipping Details</h3>
                    <form id="checkout-form">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                            <input type="text" placeholder="First Name" required>
                            <input type="text" placeholder="Last Name" required>
                        </div>
                        <input type="email" placeholder="Email Address" required style="margin-bottom: 20px;">
                        <input type="tel" placeholder="Phone Number" required style="margin-bottom: 20px;">
                        <input type="text" placeholder="Full Address" required style="margin-bottom: 20px;">
                        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 30px;">
                            <input type="text" placeholder="City" required>
                            <input type="text" placeholder="State" required>
                            <input type="text" placeholder="PIN Code" required>
                        </div>
                        
                        <h3 style="margin-bottom: 20px; padding-top: 20px; border-top: 1px solid var(--glass-border);">Payment Method</h3>
                        <div style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px;">
                            <label style="display: flex; align-items: center; gap: 12px; padding: 16px; background: var(--glass-heavy); border-radius: var(--radius-sm); border: 1px solid var(--glass-border); cursor: pointer;">
                                <input type="radio" name="payment" value="card" checked style="width: auto; accent-color: var(--primary);">
                                <span>💳 Credit / Debit Card</span>
                            </label>
                            <label style="display: flex; align-items: center; gap: 12px; padding: 16px; background: var(--glass-heavy); border-radius: var(--radius-sm); border: 1px solid var(--glass-border); cursor: pointer;">
                                <input type="radio" name="payment" value="upi" style="width: auto; accent-color: var(--primary);">
                                <span>📱 UPI Payment</span>
                            </label>
                            <label style="display: flex; align-items: center; gap: 12px; padding: 16px; background: var(--glass-heavy); border-radius: var(--radius-sm); border: 1px solid var(--glass-border); cursor: pointer;">
                                <input type="radio" name="payment" value="cod" style="width: auto; accent-color: var(--primary);">
                                <span>🚚 Cash on Delivery</span>
                            </label>
                        </div>

                        <div id="card-fields">
                            <div class="glass-morphism" style="padding: 24px; border-radius: var(--radius-md); border-style: dashed; margin-bottom: 30px;">
                                <input type="text" placeholder="Card Number (e.g. 4242 4242 4242 4242)" required style="margin-bottom: 16px;">
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                                    <input type="text" placeholder="MM / YY" required>
                                    <input type="text" placeholder="CVV" required>
                                </div>
                            </div>
                        </div>
                        
                        <button type="submit" id="complete-order-btn" class="btn btn-primary" style="width: 100%; padding: 18px; justify-content: center;">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                            Complete Secure Purchase
                        </button>
                    </form>
                </div>
                
                <div id="order-summary">
                    <!-- Order summary rendered by app.js -->
                </div>
            </div>
        </section>
    </main>

    <footer></footer>

    <script src="../js/app.js"></script>
    <script>
        // Toggle card fields based on payment method
        document.querySelectorAll('input[name="payment"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                const cardFields = document.getElementById('card-fields');
                if (e.target.value === 'card') {
                    cardFields.style.display = 'block';
                    cardFields.querySelectorAll('input').forEach(i => i.required = true);
                } else {
                    cardFields.style.display = 'none';
                    cardFields.querySelectorAll('input').forEach(i => i.required = false);
                }
            });
        });
    </script>
</body>
</html>
