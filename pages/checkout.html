<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Secure Payment</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .checkout-grid {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 40px;
            margin-bottom: 100px;
        }
        .checkout-form {
            background: var(--glass);
            padding: 40px;
            border-radius: var(--radius-md);
            border: 1px solid var(--glass-border);
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="../index.html" class="brand">RAY-BAN | META</a>
                <ul class="nav-links">
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="shop.html">Shop</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main style="padding-top: 120px;">
        <section class="container">
            <div class="section-title">
                <h1>Checkout</h1>
            </div>
            
            <div class="checkout-grid">
                <div class="checkout-form">
                    <h3 style="margin-bottom: 30px;">Shipping Details</h3>
                    <form>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                            <input type="text" placeholder="First Name" required>
                            <input type="text" placeholder="Last Name" required>
                        </div>
                        <input type="email" placeholder="Email Address" required style="margin-bottom: 20px;">
                        <input type="text" placeholder="Address" required style="margin-bottom: 20px;">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
                            <input type="text" placeholder="City" required>
                            <input type="text" placeholder="Zip Code" required>
                        </div>
                        
                        <h3 style="margin-bottom: 30px;">Payment</h3>
                        <input type="text" placeholder="Card Number" required style="margin-bottom: 20px;">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
                            <input type="text" placeholder="MM/YY" required>
                            <input type="text" placeholder="CVV" required>
                        </div>
                        
                        <button type="submit" id="complete-order-btn" class="btn btn-primary" style="width: 100%;">Complete Purchase</button>
                    </form>
                </div>
                
                <div id="order-summary" style="padding: 20px;">
                    <!-- Order summary rendered here -->
                </div>
            </div>
        </section>
    </main>

    <script src="../js/app.js"></script>
    <script>
        window.addEventListener('load', () => {
            const container = document.getElementById('order-summary');
            const total = app.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            container.innerHTML = `
                <h3 style="margin-bottom: 20px;">Order Summary</h3>
                ${app.cart.map(item => `
                    <div style="display: flex; justify-content: space-between; margin-bottom: 10px; color: var(--text-muted);">
                        <span>${item.name} x${item.quantity}</span>
                        <span>₹${(item.price * item.quantity).toLocaleString('en-IN')}</span>
                    </div>
                `).join('')}
                <hr style="border: 0; border-top: 1px solid var(--glass-border); margin: 20px 0;">
                <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 20px;">
                    <span>Total</span>
                    <span>₹${total.toLocaleString('en-IN')}</span>
                </div>
            `;
        });
    </script>
</body>
</html>
