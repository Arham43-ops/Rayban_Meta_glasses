<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Wishlist | Ray-Ban Meta</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header></header>

    <main>
        <section class="page-header glass-morphism" style="padding: 140px 0 60px; text-align: center;">
            <div class="container animate">
                <h1 style="font-size: clamp(2rem, 5vw, 4rem);">Saved Favorites</h1>
                <p style="color: var(--text-muted); margin-top: 16px;">Your curated selection of future-ready eyewear.</p>
            </div>
        </section>

        <section class="container animate" style="padding: 80px 0 100px;">
            <div id="wishlist-items" class="product-grid">
                <!-- Wishlist items rendered here by app.js -->
            </div>

            <div id="empty-wishlist" style="text-align: center; padding: 100px 0; display: none;">
                <div style="font-size: 4rem; margin-bottom: 24px;">✨</div>
                <h2 style="margin-bottom: 16px;">Your wishlist is empty.</h2>
                <p style="color: var(--text-muted); margin-bottom: 40px;">Discovery awaits. Start adding your favorites.</p>
                <a href="shop.html" class="btn btn-primary">Discover Collection</a>
            </div>
        </section>
    </main>

    <footer></footer>

    <script src="../js/app.js"></script>

</body>
</html>
