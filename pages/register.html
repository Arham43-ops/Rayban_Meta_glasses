<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Ray-Ban Meta</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body style="height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at top right, #1a1a1a, #000);">
    
    <main class="container animate" style="max-width: 450px;">
        <div class="glass-morphism" style="padding: 40px; border-radius: var(--radius-lg);">
            <div style="text-align: center; margin-bottom: 30px;">
                <h1 style="font-size: 2rem; margin-bottom: 8px;">Create Account</h1>
                <p style="color: var(--text-muted);">Join the future of eyewear.</p>
            </div>
            
            <form>
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted);">Full Name</label>
                    <input type="text" required style="width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: var(--radius-md); color: white; outline: none;">
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted);">Email Address</label>
                    <input type="email" required style="width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: var(--radius-md); color: white; outline: none;">
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted);">Password</label>
                    <input type="password" required style="width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: var(--radius-md); color: white; outline: none;">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; border: none;">Create Account</button>
            </form>
            
            <p style="margin-top: 24px; text-align: center; color: var(--text-muted); font-size: 0.9rem;">
                Already members? <a href="login.html" style="color: var(--primary); text-decoration: none; font-weight: 500;">Sign in</a>
            </p>
        </div>
        <div style="text-align: center; margin-top: 20px;">
            <a href="../index.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.8rem;">← Back to Home</a>
        </div>
    </main>

    <script src="../js/app.js"></script>
</body>
</html>
