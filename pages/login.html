<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Ray-Ban Meta</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .auth-container { padding: 10rem 5%; max-width: 400px; margin: 0 auto; }
        .form-group { margin-bottom: 2rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--secondary); }
        .form-group input { width: 100%; padding: 1rem; background: var(--bg-card); border: 1px solid var(--glass-border); color: white; border-radius: 10px; outline: none; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1 style="margin-bottom: 3rem; text-align: center;">LOGIN</h1>
        <form>
            <div class="form-group">
                <label>Email</label>
                <input type="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; border: none; cursor: pointer;">LOGIN</button>
        </form>
        <p style="margin-top: 2rem; text-align: center; color: var(--secondary);">Don't have an account? <a href="register.html" style="color: white; text-decoration: none;">Register</a></p>
    </div>
</body>
</html>
