<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | Ray-Ban Meta</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header></header>

    <main>
        <section class="page-header glass-morphism" style="padding: 140px 0 60px; text-align: center;">
            <div class="container animate">
                <h1 style="font-size: clamp(2rem, 5vw, 4rem); font-family: 'Outfit', sans-serif;">Review Your Order</h1>
                <p style="color: var(--text-muted); margin-top: 16px; font-size: 1.1rem;">Ready to bring home the future of eyewear?</p>
            </div>
        </section>

        <section class="container animate" style="padding: 80px 0 100px;">
            <div class="glass-morphism" style="padding: 40px; border-radius: var(--radius-lg); overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="text-align: left; border-bottom: 2px solid var(--glass-border); color: var(--text-muted);">
                            <th style="padding: 20px;">Product</th>
                            <th style="padding: 20px;">Price</th>
                            <th style="padding: 20px;">Quantity</th>
                            <th style="padding: 20px; text-align: right;">Total</th>
                        </tr>
                    </thead>
                    <tbody id="cart-items">
                        <!-- Cart items rendered here by app.js -->
                    </tbody>
                </table>
            </div>

            <div class="cart-footer" style="display: flex; justify-content: flex-end; margin-top: 40px;">
                <div class="glass-morphism" style="padding: 40px; border-radius: var(--radius-lg); width: 100%; max-width: 400px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                        <span style="color: var(--text-muted);">Subtotal</span>
                        <span id="cart-subtotal" style="font-weight: 600;">$0.00</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 30px; padding-top: 20px; border-top: 1px solid var(--glass-border);">
                        <span style="font-size: 1.2rem; font-weight: 700;">Order Total</span>
                        <span id="cart-total" style="font-size: 1.5rem; font-weight: 700; color: var(--primary);">$0.00</span>
                    </div>
                    <a href="checkout.html" class="btn btn-primary" style="width: 100%; padding: 18px; text-align: center; justify-content: center;" id="checkout-btn">Proceed to Checkout</a>
                    <a href="shop.html" style="display: block; text-align: center; margin-top: 20px; color: var(--text-muted); font-size: 0.9rem;">Continue Shopping</a>
                </div>
            </div>
        </section>
    </main>

    <footer></footer>

    <script src="../js/app.js"></script>
</body>
</html>
