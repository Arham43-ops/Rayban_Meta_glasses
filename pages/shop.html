<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | Ray-Ban Meta Collection</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header></header>

    <main>
        <section class="page-header glass-morphism" style="padding: 140px 0 60px; text-align: center;">
            <div class="container animate">
                <h1 style="font-size: clamp(2rem, 5vw, 4rem); font-family: 'Outfit', sans-serif;">The Full Collection</h1>
                <p style="color: var(--text-muted); margin-top: 16px; font-size: 1.1rem;">Precision optics meets cutting-edge intelligence.</p>
            </div>
        </section>

        <section class="container" style="padding: 60px 0;">
            <div class="filters animate" style="display: flex; justify-content: center; gap: 15px; margin-bottom: 50px;">
                <button class="btn btn-glass filter-btn active" onclick="app.renderShop('all')">All Collection</button>
                <button class="btn btn-glass filter-btn" onclick="app.renderShop('Wayfarer')">Wayfarer</button>
                <button class="btn btn-glass filter-btn" onclick="app.renderShop('Headliner')">Headliner</button>
                <button class="btn btn-glass filter-btn" onclick="app.renderShop('Skyler')">Skyler</button>
            </div>
            
            <div id="shop-grid" class="product-grid animate">
                <!-- Dynamically rendered by app.js -->
            </div>
        </section>
    </main>

    <footer></footer>

    <script src="../js/app.js"></script>
</body>
</html>
