<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | Ray-Ban Meta Collection</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .shop-header {
            padding: 160px 0 60px;
            background: linear-gradient(to bottom, #111, #0A0A0A);
            text-align: center;
        }
        .filters {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="../index.html" class="brand">RAY-BAN | META</a>
                <ul class="nav-links">
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="shop.html">Shop</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
                <div class="nav-actions">
                    <a href="cart.html" id="cart-btn">
                        🛒 <span class="cart-count">0</span>
                    </a>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <section class="shop-header">
            <div class="container">
                <h1>The Full Collection</h1>
                <p style="color: var(--text-muted); margin-top: 16px;">Find your perfect fit and style.</p>
            </div>
        </section>

        <section class="container">
            <div class="filters">
                <button class="btn btn-glass" onclick="filterProducts('All')">All</button>
                <button class="btn btn-glass" onclick="filterProducts('Wayfarer')">Wayfarer</button>
                <button class="btn btn-glass" onclick="filterProducts('Headliner')">Headliner</button>
                <button class="btn btn-glass" onclick="filterProducts('Skyler')">Skyler</button>
            </div>
            
            <div id="products-container" class="products-grid">
                <!-- Dynamically rendered -->
            </div>
        </section>
    </main>

    <footer style="margin-top: 100px;">
        <div class="container">
            <div class="footer-bottom">
                &copy; 2026 Ray-Ban Meta Shop. All Rights Reserved.
            </div>
        </div>
    </footer>

    <script src="../js/app.js"></script>
    <script>
        // Custom filter for this page
        function filterProducts(category) {
            const container = document.getElementById('products-container');
            const filtered = category === 'All' 
                ? PRODUCTS 
                : PRODUCTS.filter(p => p.category === category);
            
            // Determine if we are in a subdirectory (like /pages/)
            const isSubDir = window.location.pathname.includes('/pages/');
            const basePath = isSubDir ? '../' : '';

            container.innerHTML = filtered.map(p => `
                <div class="product-card animate" style="opacity: 1; transform: translateY(0);">
                    <div class="product-img-wrapper" style="position: relative; overflow: hidden; height: 300px; border-radius: 8px;">
                        <img src="${basePath}${p.image}" alt="${p.name}" class="product-img" style="width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease;">
                    </div>
                    <div class="product-info" style="padding: 20px 0;">
                        <span style="font-size: 12px; text-transform: uppercase; color: var(--accent); letter-spacing: 2px;">${p.category}</span>
                        <h3 style="margin: 10px 0; font-size: 20px;">${p.name}</h3>
                        <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 20px;">${p.description}</p>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span class="price" style="font-size: 18px; font-weight: 600;">${app.formatPrice(p.price)}</span>
                            <button class="btn btn-primary" style="padding: 10px 20px;" onclick="app.addToCart(${p.id})">Add to Cart</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // Initial render
        window.addEventListener('load', () => filterProducts('All'));
    </script>
</body>
</html>
